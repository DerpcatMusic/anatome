# Static SvelteKit site (@sveltejs/adapter-static → `build/`).
#
# Cloudflare Pages (Git):
#   Build command:        bun run build
#   Build output dir:     build
#   Deploy command:       bun run deploy
#     (or leave deploy empty if the dashboard allows it)
#
# Do NOT use `wrangler deploy` — that is Workers. Wrangler will warn:
# "run wrangler pages deploy on a Pages project" and fail without main/assets.
#
# Manual: bun run build && bun run deploy

name = "anatome"
pages_build_output_dir = "build"
compatibility_date = "2026-05-24"
