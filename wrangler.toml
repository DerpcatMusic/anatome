# Cloudflare Workers — static assets only (same `build/` as adapter-static).
# Convex/LiveKit/Mux stay off Cloudflare; this only hosts HTML/JS/CSS.
#
# CI (Workers project with Git):
#   Build:  bun run build
#   Deploy: bun run deploy   (or npx wrangler deploy)
#
# SPA app routes use static/_redirects → /200.html (not Workers' default /index.html SPA mode).

name = "anatome"
compatibility_date = "2026-05-24"

[assets]
directory = "build"
