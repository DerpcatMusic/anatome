# Static SvelteKit (@sveltejs/adapter-static → build/). Convex stays off Cloudflare.
#
# CI: build = bun run build, deploy = bun run deploy
#
# Custom domains: anatome.co.il + www.anatome.co.il (delete apex A to old host first).

name = "anatome"
compatibility_date = "2026-05-24"
main = "worker/index.ts"

[assets]
directory = "build"
binding = "ASSETS"
html_handling = "none"
