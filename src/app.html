<!doctype html>
<html lang="he" dir="rtl">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.svg" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<meta name="theme-color" content="#faf8f3" media="(prefers-color-scheme: light)" />
		<meta name="theme-color" content="#1e1f24" media="(prefers-color-scheme: dark)" />
		<link rel="preload" href="/og-image.webp" as="image" type="image/webp" fetchpriority="high" />
		<script>
			(() => {
				try {
					const stored = localStorage.getItem('homebody-theme');
					const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
					const isDark =
						stored === 'dark' || (stored !== 'light' && prefersDark);
					document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
				} catch {
					/* localStorage unavailable */
				}
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="tap">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
