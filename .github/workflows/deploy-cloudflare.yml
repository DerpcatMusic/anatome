# Deploy static SvelteKit build to Cloudflare Workers (wrangler.toml → worker + build/).
# Required GitHub repo secrets: see README § Cloudflare CI.

name: Deploy to Cloudflare

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy-cloudflare
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build static site
        run: bun run build
        env:
          PUBLIC_CONVEX_CLIENT_URL: ${{ secrets.PUBLIC_CONVEX_CLIENT_URL }}
          PUBLIC_MUX_ENV_KEY: ${{ secrets.PUBLIC_MUX_ENV_KEY }}

      - name: Deploy Worker + assets
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
